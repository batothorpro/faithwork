<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restablecer contraseña — FaithWork</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-screen">
    <div class="auth-brand">
      <div class="brand-mark">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5z" fill="#c9a84c"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="#c9a84c" stroke-width="1.6" fill="none"/></svg>
      </div>
      <h1 class="brand-name">FaithWork</h1>
      <p class="brand-tagline">Restablece tu contraseña</p>
    </div>

    <div class="auth-card">
      <div id="reset-loading">
        <p style="text-align:center;color:var(--gray-3);padding:1rem 0">Verificando enlace...</p>
      </div>

      <div id="reset-invalid" class="hidden">
        <div class="error-msg">Este enlace es inválido o ha expirado. Solicita uno nuevo desde la pantalla de inicio de sesión.</div>
        <a href="/" class="btn-primary full" style="margin-top:1rem;text-align:center;display:block;text-decoration:none">Volver a FaithWork</a>
      </div>

      <div id="reset-form" class="hidden">
        <p class="auth-helper-text">Ingresa tu nueva contraseña.</p>
        <div class="form-group"><label>Nueva contraseña</label><input type="password" id="new-password" placeholder="Mínimo 6 caracteres"></div>
        <div class="form-group"><label>Confirmar contraseña</label><input type="password" id="confirm-password" placeholder="Repite la contraseña"></div>
        <div id="reset-error" class="error-msg hidden"></div>
        <button class="btn-primary full" onclick="submitNewPassword()">Cambiar contraseña</button>
      </div>

      <div id="reset-success" class="hidden">
        <div class="success-msg">¡Tu contraseña ha sido actualizada correctamente!</div>
        <a href="/" class="btn-primary full" style="margin-top:1rem;text-align:center;display:block;text-decoration:none">Iniciar sesión</a>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const token = params.get('token');

    async function checkToken() {
      if (!token) { showInvalid(); return; }
      try {
        const res = await fetch('/api/auth/reset-password/' + token);
        const data = await res.json();
        if (data.valid) {
          document.getElementById('reset-loading').classList.add('hidden');
          document.getElementById('reset-form').classList.remove('hidden');
        } else {
          showInvalid();
        }
      } catch (e) { showInvalid(); }
    }

    function showInvalid() {
      document.getElementById('reset-loading').classList.add('hidden');
      document.getElementById('reset-invalid').classList.remove('hidden');
    }

    async function submitNewPassword() {
      const p1 = document.getElementById('new-password').value;
      const p2 = document.getElementById('confirm-password').value;
      const errEl = document.getElementById('reset-error');
      errEl.classList.add('hidden');

      if (p1.length < 6) { errEl.textContent = 'La contraseña debe tener al menos 6 caracteres'; errEl.classList.remove('hidden'); return; }
      if (p1 !== p2) { errEl.textContent = 'Las contraseñas no coinciden'; errEl.classList.remove('hidden'); return; }

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password: p1 })
        });
        const data = await res.json();
        if (data.error) { errEl.textContent = data.error; errEl.classList.remove('hidden'); return; }
        document.getElementById('reset-form').classList.add('hidden');
        document.getElementById('reset-success').classList.remove('hidden');
      } catch (e) {
        errEl.textContent = 'Error de conexión';
        errEl.classList.remove('hidden');
      }
    }

    checkToken();
  </script>
</body>
</html>
